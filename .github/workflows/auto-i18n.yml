name: Sync I18n Docs Updates  
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "docs/nav/data.ts"
      - "docs/project/data.ts"
      - "docs/press/index.md"
      - "docs/press/**/*.md"
      - "docs/index.md"
      - "docs/structure/index.md"
      - "docs/rules/index.md"
      - "docs/.vitepress/configs/*.ts"
jobs:  
  doc-sync:  
    runs-on: ubuntu-latest 
    timeout-minutes: 15 
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'claude' 
    permissions:  
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs  
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0


  

          settings: |  
             {  
               "env": {  
                 "ANTHROPIC_BASE_URL": "https://aigateway.huggingai.org"  
               }  
             }
