name: Fetch Bilibili Videos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-22.04   # ✅ 明确指定 runner，避免灰度问题

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ 放在 job 级，绝对生效

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch latest videos
        run: |
          python fetch_videos.py

      - name: Commit and push changes
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add videos.json
            git commit -m "chore: update bilibili videos"
            git push
          else
            echo "No changes to commit"
          fi
